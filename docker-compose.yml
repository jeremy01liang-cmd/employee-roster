services:
  backend:
    build:
      context: ./backend
    container_name: employee-roster-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      CORS_ORIGIN: "*"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: employee-roster-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

